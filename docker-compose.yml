version: '3.8'

services:
  # Service 1: The Web Server
  web:
    image: nginx:alpine
    container_name: website-static-website
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - site-data:/usr/share/nginx/html:ro
    restart: unless-stopped

  # Service 2: The Git Syncer
  git-puller:
    image: alpine/git
    container_name: website-updater
    restart: unless-stopped
    volumes:
      - site-data:/data
    environment:
      - REPO_URL=${REPO_URL}
      - BRANCH=${BRANCH:-main}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
    entrypoint: >
      /bin/sh -c "
        apk add --no-cache bash &&
        mkdir -p /data &&
        cd /data &&
        while true; do
          if [ -d .git ]; then
            echo 'Checking for updates...'
            git pull origin $BRANCH
          else
            echo 'Cloning repository...'
            rm -rf *
            git clone -b $BRANCH $REPO_URL .
          fi
          sleep $CHECK_INTERVAL
        done
      "

  # Service 3: Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: website-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}

volumes:
  site-data:
